name: Generate SBOM

on:
  push:
    branches: ["main"]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd OPC/cerebro-hive-website
          npm ci

      - name: Generate CycloneDX SBOM
        run: |
          cd OPC/cerebro-hive-website
          npx -y @cyclonedx/cyclonedx-npm --output-format JSON --output-file ../../sbom.json
          
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
