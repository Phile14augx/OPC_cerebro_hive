name: Automated Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Build and Package
        run: |
          cd OPC/cerebro-hive-website
          npm ci
          npm run build
          tar -czvf release-bundle.tar.gz out/
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OPC/cerebro-hive-website/release-bundle.tar.gz
