name: Documentation Validation

on:
  push:
    paths:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          
      - name: Check Markdown Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress './**/*.md'
