name: Deploy to VPS via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './OPC/cerebro-hive-website/package-lock.json'

    - name: Install dependencies
      working-directory: ./OPC/cerebro-hive-website
      run: npm ci

    - name: Generate Prisma client
      working-directory: ./OPC/cerebro-hive-website
      run: npx prisma generate

    - name: Build standalone
      working-directory: ./OPC/cerebro-hive-website
      run: npm run build
      env:
        IS_FTP_DEPLOY: "true"

    - name: Prepare bundle
      working-directory: ./OPC/cerebro-hive-website
      run: |
        cp -R public .next/standalone/
        cp -R .next/static .next/standalone/.next/

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

    - name: Bootstrap VPS
      run: >
        ssh -i ~/.ssh/deploy_key
        -o StrictHostKeyChecking=no
        ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        "
        command -v node || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs);
        command -v pm2 || npm install -g pm2;
        command -v nginx || (apt-get install -y nginx && systemctl enable nginx);
        mkdir -p /var/www/cerebro-hive
        "

    - name: Upload build
      run: |
        rsync -az --delete \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./OPC/cerebro-hive-website/.next/standalone/ \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/cerebro-hive/

    - name: Restart app with PM2
      run: >
        ssh -i ~/.ssh/deploy_key
        -o StrictHostKeyChecking=no
        ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        "
        cd /var/www/cerebro-hive &&
        (pm2 describe cerebro-hive > /dev/null 2>&1 && pm2 restart cerebro-hive || (pm2 start server.js --name cerebro-hive && pm2 save))
        "

    - name: Configure Nginx
      run: >
        ssh -i ~/.ssh/deploy_key
        -o StrictHostKeyChecking=no
        ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        "
        printf 'server {\n  listen 80;\n  server_name cerebropchive.org www.cerebropchive.org _;\n  location / {\n    proxy_pass http://localhost:3000;\n    proxy_http_version 1.1;\n    proxy_set_header Upgrade \$http_upgrade;\n    proxy_set_header Connection upgrade;\n    proxy_set_header Host \$host;\n    proxy_set_header X-Real-IP \$remote_addr;\n    proxy_cache_bypass \$http_upgrade;\n  }\n}\n' > /etc/nginx/sites-available/cerebro-hive &&
        ln -sf /etc/nginx/sites-available/cerebro-hive /etc/nginx/sites-enabled/cerebro-hive &&
        rm -f /etc/nginx/sites-enabled/default &&
        nginx -t && systemctl reload nginx
        "
