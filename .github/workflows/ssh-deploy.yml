name: Deploy to VPS via SSH

# The VPS owns the build: this job simply triggers the idempotent one-shot
# deploy script (git pull → docker stack → prisma → next build → PM2 → nginx →
# certbot → health checks). Full log is echoed back into the Actions output.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Run vps-deploy.sh on the VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Deploy over SSH
      uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        command_timeout: 25m
        script: |
          bash /opt/cerebro/OPC/cerebro-hive-website/scripts/deploy/vps-deploy.sh
