name: Deploy to cPanel / Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './OPC/cerebro-hive-website/package-lock.json'
        
    - name: 🔨 Install Dependencies
      working-directory: ./OPC/cerebro-hive-website
      run: npm ci
      
    - name: 🏗️ Build Project
      working-directory: ./OPC/cerebro-hive-website
      run: npm run build
      env:
        IS_FTP_DEPLOY: "true"
      
    - name: 📂 Sync files to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./OPC/cerebro-hive-website/out/
        server-dir: /
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
