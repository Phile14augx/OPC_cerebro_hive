name: Security Pipeline

# ──────────────────────────────────────────────────────────────────────────────
# CerebroHive — Full DevSecOps Security Pipeline
#
# Stages (all run in parallel, gate at the end):
#   1. Secret Detection     — Gitleaks (blocks on any finding)
#   2. SAST                 — Semgrep (custom rules + OWASP)
#   3. Dependency Scan      — npm audit + pip-audit + OSV-Scanner
#   4. Container Scan       — Trivy (image + filesystem)
#   5. IaC Scan             — Checkov (Terraform + K8s manifests)
#   6. SBOM Generation      — Syft → CycloneDX
#   7. Supply Chain         — Scorecard (on push to main)
#   8. Gate                 — aggregate report → PR comment
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Daily sweep — advisory databases update independently of commits
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write   # for uploading SARIF to GitHub Security tab
  id-token: write          # for OIDC-based supply chain signing

# ────────────────────────────────────────────────────────────
# 1. Secret detection — MUST pass before anything else ships
# ────────────────────────────────────────────────────────────
jobs:
  secret-scan:
    name: 🔑 Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ────────────────────────────────────────────────────────────
  # 2. SAST — Semgrep with CerebroHive custom rules
  # ────────────────────────────────────────────────────────────
  sast:
    name: 🔍 SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7

      - name: Run Semgrep
        run: |
          semgrep \
            --config=auto \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/secrets \
            --config=p/sql-injection \
            --config=.semgrep/rules/ \
            --sarif \
            --output=semgrep.sarif \
            --error \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.next \
            --exclude="*.min.js" \
            || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # 3. Dependency vulnerability scanning
  # ────────────────────────────────────────────────────────────
  dependency-scan:
    name: 📦 Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit (high+)
        run: pnpm audit --audit-level=high --json > npm-audit.json || true

      - name: OSV-Scanner — full dependency graph
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=json
            --output=osv-results.json
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-scan-results
          path: |
            npm-audit.json
            osv-results.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # 4. Container scanning — Trivy
  # ────────────────────────────────────────────────────────────
  container-scan:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scan filesystem (no build needed)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          skip-dirs: node_modules,dist,.next
        continue-on-error: true

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Scan forge-api Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker build -f services/forge-api/Dockerfile -t cerebrohive-forge-api:ci . || true
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.cache/trivy:/root/.cache/trivy \
            aquasec/trivy:latest image \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-image.sarif \
            cerebrohive-forge-api:ci || true
        continue-on-error: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 5. IaC scanning — Checkov (Terraform + Kubernetes)
  # ────────────────────────────────────────────────────────────
  iac-scan:
    name: 🏗️ IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov-tf.sarif
          soft_fail: true
        continue-on-error: true

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/k8s
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s.sarif
          soft_fail: true
        continue-on-error: true

      - name: Run Checkov on Helm charts
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/helm
          framework: helm
          output_format: sarif
          output_file_path: checkov-helm.sarif
          soft_fail: true
        continue-on-error: true

      - name: Run Checkov on Dockerfiles
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-docker.sarif
          soft_fail: true
        continue-on-error: true

      - name: Upload IaC SARIF reports
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-tf.sarif
          category: checkov-terraform
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 6. SBOM generation — Syft (CycloneDX format)
  # ────────────────────────────────────────────────────────────
  sbom:
    name: 📋 SBOM Generation (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          upload-artifact-retention: 90

      - name: Generate SBOM (SPDX format)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90

  # ────────────────────────────────────────────────────────────
  # 7. OpenSSF Scorecard — supply chain health (main only)
  # ────────────────────────────────────────────────────────────
  scorecard:
    name: 🏆 OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif
          category: scorecard

  # ────────────────────────────────────────────────────────────
  # 8. Security gate — aggregate and report
  # ────────────────────────────────────────────────────────────
  security-gate:
    name: 🛡️ Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dependency-scan, container-scan, iac-scan, sbom]
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          echo "secret-scan: ${{ needs.secret-scan.result }}"
          echo "sast:        ${{ needs.sast.result }}"
          echo "dep-scan:    ${{ needs.dependency-scan.result }}"
          echo "container:   ${{ needs.container-scan.result }}"
          echo "iac:         ${{ needs.iac-scan.result }}"
          echo "sbom:        ${{ needs.sbom.result }}"

          # Secret scan must ALWAYS pass — a found secret is a hard block
          if [[ "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "::error::🔑 SECRET DETECTED — this PR cannot be merged. Rotate the exposed credential immediately."
            exit 1
          fi
          echo "Security gate passed ✅"

      - name: Post security report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const icon = (r) => ({ success:'✅', failure:'❌', skipped:'⏭️' }[r] ?? '⏳');
            const rows = [
              ['Secret Detection',  '${{ needs.secret-scan.result }}'],
              ['SAST (Semgrep)',    '${{ needs.sast.result }}'],
              ['Dependency Scan',  '${{ needs.dependency-scan.result }}'],
              ['Container Scan',   '${{ needs.container-scan.result }}'],
              ['IaC Scan',         '${{ needs.iac-scan.result }}'],
              ['SBOM Generated',   '${{ needs.sbom.result }}'],
            ].map(([n,r]) => `| ${n} | ${icon(r)} \`${r}\` |`).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🛡️ Security Pipeline Report\n\n| Check | Result |\n|---|---|\n${rows}\n\n` +
                    `Full SARIF reports uploaded to the [Security tab](https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning).`
            });
