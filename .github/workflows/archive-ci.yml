name: CerebroArchive CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'OPC/cerebroarchive/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'OPC/cerebroarchive/**'

jobs:
  validate:
    name: Lint, Test, and Verify
    runs-on: ubuntu-latest
    
    # Spin up Postgres for migration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cerebro
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cerebroarchive
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: OPC/cerebroarchive/apps/api/go.sum

      - name: Install SQLC
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      # 1. Migration Verification
      - name: Test Database Migrations (UP)
        working-directory: ./OPC/cerebroarchive/database/migrations
        run: migrate -path . -database "postgres://cerebro:password@localhost:5432/cerebroarchive?sslmode=disable" up

      - name: Test Database Migrations (DOWN)
        working-directory: ./OPC/cerebroarchive/database/migrations
        run: migrate -path . -database "postgres://cerebro:password@localhost:5432/cerebroarchive?sslmode=disable" down -all

      # Reset DB for tests
      - name: Reset Database
        working-directory: ./OPC/cerebroarchive/database/migrations
        run: migrate -path . -database "postgres://cerebro:password@localhost:5432/cerebroarchive?sslmode=disable" up

      # 2. SQLC Drift Check
      - name: Verify SQLC Generation
        working-directory: ./OPC/cerebroarchive/database/sqlc
        run: |
          sqlc generate
          if [[ -n $(git status --porcelain) ]]; then
            echo "SQLC generated code is out of sync. Please run 'sqlc generate' and commit the changes."
            git diff
            exit 1
          fi

      # 3. Linting
      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: OPC/cerebroarchive/apps/api

      # 4. Unit Tests with Race Detector
      - name: Run Go Tests
        working-directory: ./OPC/cerebroarchive/apps/api
        run: go test -v -race ./...
