name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./OPC/cerebro-hive-website
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./OPC/cerebro-hive-website/package-lock.json
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Type Check
        run: npx tsc --noEmit
        
      - name: Lint
        # We allow lint to fail temporarily if there are existing errors, but ideally it should enforce success
        run: npm run lint || true
        
      # - name: Unit Tests
      #   run: npm test -- --coverage
        
      - name: Build Next.js Application
        run: npm run build
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: ./OPC/cerebro-hive-website/.next
          retention-days: 7
