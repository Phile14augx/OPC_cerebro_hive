name: CI

# ──────────────────────────────────────────────────────────────────────────────
# CerebroHive — Continuous Integration Pipeline
#
# Stages (parallel where possible):
#   1. Validate    — type-check, lint
#   2. Test        — unit, integration (Postgres + Redis)
#   3. Build       — all apps via Turborepo matrix
#   4. Artifacts   — build outputs + OpenAPI specs
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop, "release/*", "hotfix/*"]
  pull_request:
    branches: [main, develop, "release/*"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Type checking
  # ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cerebro/database exec prisma generate

      - name: Type check — studio
        run: pnpm --filter @cerebro/studio exec tsc --noEmit

      - name: Type check — forge
        run: pnpm --filter @cerebro/forge exec tsc --noEmit
        continue-on-error: true

      - name: Type check — platform-api
        run: pnpm --filter @cerebro/platform-api exec tsc --noEmit
        continue-on-error: true

      - name: Type check — ai-gateway
        run: pnpm --filter @cerebro/ai-gateway exec tsc --noEmit
        continue-on-error: true

      - name: Type check — forge-api
        run: pnpm --filter @cerebro/forge-api exec tsc --noEmit
        continue-on-error: true

      - name: Type check — shared packages
        run: |
          pnpm --filter @cerebro/ai exec tsc --noEmit || true
          pnpm --filter @cerebro/workflow exec tsc --noEmit || true
          pnpm --filter @cerebro/telemetry exec tsc --noEmit || true
          pnpm --filter @cerebro/events exec tsc --noEmit || true

  # ────────────────────────────────────────────────────────────
  # 2. Linting + formatting
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint || true

      - name: Check Prettier formatting
        run: |
          pnpm exec prettier --check \
            "**/*.{ts,tsx,json,yaml,yml}" \
            --ignore-path .gitignore \
            --ignore-path .prettierignore || true

  # ────────────────────────────────────────────────────────────
  # 3. Unit tests
  # ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cerebro/database exec prisma generate

      - name: Run unit tests
        run: pnpm run test --if-present
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: "**/coverage/**"
          retention-days: 14

  # ────────────────────────────────────────────────────────────
  # 4. Integration tests (Postgres + Redis services)
  # ────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cerebrohive
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: cerebrohive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cerebro/database exec prisma generate

      - name: Run DB migrations
        run: pnpm --filter @cerebro/database exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://cerebrohive:test_password@localhost:5432/cerebrohive_test

      - name: Run integration tests
        run: pnpm run test:integration --if-present
        env:
          DATABASE_URL: postgresql://cerebrohive:test_password@localhost:5432/cerebrohive_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          CI: true
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 5. Build matrix (all apps)
  # ────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    needs: [typecheck]
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: studio
            filter: "@cerebro/studio"
            output: "apps/studio/.next"
          - name: forge
            filter: "@cerebro/forge"
            output: "apps/forge/.next"
          - name: platform-api
            filter: "@cerebro/platform-api"
            output: "apps/platform-api/dist"
          - name: forge-api
            filter: "@cerebro/forge-api"
            output: "services/forge-api/dist"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cerebro/database exec prisma generate

      - name: Build ${{ matrix.app.name }}
        run: pnpm --filter "${{ matrix.app.filter }}" run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app.name }}
          path: ${{ matrix.app.output }}
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # 6. Generate OpenAPI spec from platform-api
  # ────────────────────────────────────────────────────────────
  openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: pnpm --filter @cerebro/platform-api run generate:openapi --if-present
        continue-on-error: true

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-spec
          path: "**/openapi.json"
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # 7. CI gate — blocks merge if critical checks fail
  # ────────────────────────────────────────────────────────────
  ci-gate:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests, build]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "lint:      ${{ needs.lint.result }}"
          echo "tests:     ${{ needs.unit-tests.result }}"
          echo "build:     ${{ needs.build.result }}"
          if [[ "${{ needs.typecheck.result }}" == "failure" ]]; then
            echo "::error::Type check failed — fix TypeScript errors before merging."
            exit 1
          fi
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::Build failed — one or more apps did not compile."
            exit 1
          fi
          echo "All required CI checks passed."

      - name: Post CI summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const icon = (r) => ({ success:'✅', failure:'❌', skipped:'⏭️' }[r] ?? '⏳');
            const rows = [
              ['Type Check', '${{ needs.typecheck.result }}'],
              ['Lint',       '${{ needs.lint.result }}'],
              ['Unit Tests', '${{ needs.unit-tests.result }}'],
              ['Build',      '${{ needs.build.result }}'],
            ].map(([n,r]) => `| ${n} | ${icon(r)} \`${r}\` |`).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI Pipeline Results\n\n| Check | Status |\n|---|---|\n${rows}`
            });
