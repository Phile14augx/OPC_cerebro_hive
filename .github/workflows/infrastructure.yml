name: Infrastructure

# ──────────────────────────────────────────────────────────────────────────────
# CerebroHive — Terraform Infrastructure Pipeline
#
# Plan on PR, Apply on merge to main / manual dispatch for production.
# State stored in S3 + DynamoDB lock table per environment.
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    paths:
      - "infra/terraform/**"
    branches: [main, develop]
  push:
    paths:
      - "infra/terraform/**"
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, production]
      action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # AWS OIDC

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Detect which environments changed
  # ────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Environment Changes
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.changes.outputs.dev }}
      staging: ${{ steps.changes.outputs.staging }}
      production: ${{ steps.changes.outputs.production }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            dev:
              - 'infra/terraform/environments/dev/**'
              - 'infra/terraform/modules/**'
            staging:
              - 'infra/terraform/environments/staging/**'
              - 'infra/terraform/modules/**'
            production:
              - 'infra/terraform/environments/production/**'
              - 'infra/terraform/modules/**'

  # ────────────────────────────────────────────────────────────
  # Terraform validate (always runs)
  # ────────────────────────────────────────────────────────────
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, production]
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/terraform/
        continue-on-error: true

      - name: Terraform validate — ${{ matrix.environment }}
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: |
          terraform init -backend=false
          terraform validate

  # ────────────────────────────────────────────────────────────
  # Terraform plan (on PR + push)
  # ────────────────────────────────────────────────────────────
  plan:
    name: Plan — ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            changed: ${{ needs.detect-changes.outputs.dev }}
            role_arn: ${{ secrets.AWS_DEV_ROLE_ARN }}
          - environment: staging
            changed: ${{ needs.detect-changes.outputs.staging }}
            role_arn: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          - environment: production
            changed: ${{ needs.detect-changes.outputs.production }}
            role_arn: ${{ secrets.AWS_PROD_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v7
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'

      - name: Configure AWS OIDC credentials
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: plan
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan \
            -out=tfplan-${{ matrix.environment }} \
            -var-file=terraform.tfvars \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload plan artifact
        if: steps.plan.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/terraform/environments/${{ matrix.environment }}/tfplan-${{ matrix.environment }}
          retention-days: 7

      - name: Post plan to PR
        if: github.event_name == 'pull_request' && (matrix.changed == 'true' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('infra/terraform/environments/${{ matrix.environment }}/plan-output.txt', 'utf8');
            } catch(e) {
              planOutput = 'Plan output not available.';
            }
            // Truncate to GitHub comment limit
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n[... truncated ...]'
              : planOutput;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🏗️ Terraform Plan — \`${{ matrix.environment }}\`\n\n<details><summary>Show Plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            });

  # ────────────────────────────────────────────────────────────
  # Terraform apply (main push or manual dispatch)
  # ────────────────────────────────────────────────────────────
  apply:
    name: Apply — ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: [validate]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v7

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS OIDC credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_{0}_ROLE_ARN', steps.env.outputs.name)] }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/${{ steps.env.outputs.name }}
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform/environments/${{ steps.env.outputs.name }}
        run: |
          terraform apply \
            -auto-approve \
            -var-file=terraform.tfvars \
            2>&1 | tee apply-output.txt

      - name: Upload apply output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: terraform-apply-${{ steps.env.outputs.name }}-${{ github.run_id }}
          path: infra/terraform/environments/${{ steps.env.outputs.name }}/apply-output.txt
          retention-days: 30
