version: '3.8'

services:
  # ---------------------------------------------------------
  # PostgreSQL Database (Primary Data Store)
  # ---------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cerebroarchive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cerebro
      POSTGRES_PASSWORD: cerebro_password
      POSTGRES_DB: cerebroarchive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebro -d cerebroarchive"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Valkey (High-Performance Caching & Session Store)
  # ---------------------------------------------------------
  valkey:
    image: valkey/valkey:7.2
    container_name: cerebroarchive-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
