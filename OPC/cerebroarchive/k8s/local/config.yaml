apiVersion: v1
kind: ConfigMap
metadata:
  name: cerebro-config
data:
  API_URL: "http://api-service:8080/api/v1"
  NATS_URL: "nats://nats-service:4222"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "cerebro"
  ENVIRONMENT: "local"

---
apiVersion: v1
kind: Secret
metadata:
  name: cerebro-secrets
type: Opaque
stringData:
  DB_PASSWORD: "local-dev-password"
  OPENAI_API_KEY: "sk-mock-key-for-local"
  PINECONE_API_KEY: "mock-pinecone-key"
