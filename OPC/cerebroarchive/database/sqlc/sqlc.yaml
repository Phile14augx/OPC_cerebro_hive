version: "2"
sql:
  - schema: "../migrations"
    queries: "../../apps/api/internal"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "../../apps/api/internal/platform/database/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
