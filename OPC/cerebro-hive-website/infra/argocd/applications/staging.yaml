---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cerebro-hive-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: cerebro-deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: cerebro-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cerebro-hive

  source:
    repoURL: https://github.com/cerebro-hive/cerebro-hive-website
    targetRevision: main
    path: infra/helm/cerebro-hive
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cerebro-hive-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas
