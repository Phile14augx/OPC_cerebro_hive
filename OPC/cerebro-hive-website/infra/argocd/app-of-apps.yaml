---
# ──────────────────────────────────────────────────────────────────────────────
# ArgoCD App-of-Apps
# This single Application manages all environment Applications.
# Apply once with:
#   kubectl apply -f infra/argocd/app-of-apps.yaml
# ArgoCD then takes over and syncs all children.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cerebro-hive-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cerebro-hive

  source:
    repoURL: https://github.com/cerebro-hive/cerebro-hive-website
    targetRevision: main
    path: infra/argocd/applications

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
