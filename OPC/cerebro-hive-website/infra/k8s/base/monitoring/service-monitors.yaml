---
# ──────────────────────────────────────────────────────────────────────────────
# Prometheus ServiceMonitors — scrape all CerebroHive services
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: studio-monitor
  namespace: cerebro-hive-monitoring
  labels:
    app.kubernetes.io/part-of: cerebro-hive
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [cerebro-hive]
  selector:
    matchLabels:
      app.kubernetes.io/name: studio
  endpoints:
    - port: http
      path: /api/metrics
      interval: 30s
      scrapeTimeout: 10s

