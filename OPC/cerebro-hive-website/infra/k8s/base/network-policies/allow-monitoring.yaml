# ──────────────────────────────────────────────────────────────────────────────
# Allow Prometheus (monitoring namespace) to scrape all pods on metrics ports.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: cerebro-hive
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP   # Prometheus /metrics
        - port: 4317
          protocol: TCP   # OTel gRPC
        - port: 4318
          protocol: TCP   # OTel HTTP

---
# Allow OTel collector → services (push telemetry)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-collector-egress
  namespace: cerebro-hive
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
