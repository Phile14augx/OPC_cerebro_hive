# ──────────────────────────────────────────────────────────────────────────────
# External Secrets Operator — ClusterSecretStore
# Connects to AWS Secrets Manager via IRSA (pod-level IAM, no stored credentials).
# Requires: External Secrets Operator >= 0.9 installed in the cluster.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    # IRSA annotation — the ESO controller SA must have this role
    eks.amazonaws.com/role-arn: "${ESO_IRSA_ROLE_ARN}"
spec:
  provider:
    aws:
      service: SecretsManager
      region: "${AWS_REGION}"
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# Per-namespace SecretStore for cerebro-hive (inherits ClusterSecretStore)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cerebro-hive-secrets-store
  namespace: cerebro-hive
spec:
  provider:
    aws:
      service: SecretsManager
      region: "${AWS_REGION}"
      auth:
        jwt:
          serviceAccountRef:
            name: platform-api   # Uses the platform-api IRSA SA
