# ──────────────────────────────────────────────────────────────────────────────
# External Secrets — sync AWS Secrets Manager → K8s Secrets
# Each ExternalSecret creates/updates one K8s Secret.
# Refresh interval: 1h in production, 5m in dev (overridden per overlay).
# ──────────────────────────────────────────────────────────────────────────────

# ─── Core platform secrets ────────────────────────────────────────────────────
# AWS secret: cerebro-hive/production/platform
# Keys: DATABASE_URL, REDIS_URL, JWT_SECRET, NEXTAUTH_SECRET, NEXTAUTH_URL,
#       NATS_URL, KEYCLOAK_CLIENT_SECRET
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cerebro-hive-secrets
  namespace: cerebro-hive
  annotations:
    # Trigger rollout restart when secret rotates
    reloader.stakater.com/match: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cerebro-hive-secrets-store
    kind: SecretStore
  target:
    name: cerebro-hive-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: cerebro-hive/production/platform
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: cerebro-hive/production/platform
        property: REDIS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: cerebro-hive/production/platform
        property: JWT_SECRET
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: cerebro-hive/production/platform
        property: NEXTAUTH_SECRET
    - secretKey: NEXTAUTH_URL
      remoteRef:
        key: cerebro-hive/production/platform
        property: NEXTAUTH_URL
    - secretKey: NATS_URL
      remoteRef:
        key: cerebro-hive/production/platform
        property: NATS_URL
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: cerebro-hive/production/platform
        property: KEYCLOAK_CLIENT_SECRET

---
# ─── AI provider secrets ──────────────────────────────────────────────────────
# AWS secret: cerebro-hive/production/ai-providers
# Keys: ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_AI_API_KEY
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cerebro-hive-ai-secrets
  namespace: cerebro-hive
  annotations:
    reloader.stakater.com/match: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cerebro-hive-secrets-store
    kind: SecretStore
  target:
    name: cerebro-hive-ai-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: cerebro-hive/production/ai-providers
        property: ANTHROPIC_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: cerebro-hive/production/ai-providers
        property: OPENAI_API_KEY
    - secretKey: GOOGLE_AI_API_KEY
      remoteRef:
        key: cerebro-hive/production/ai-providers
        property: GOOGLE_AI_API_KEY

---
# ─── TLS certificate (from ACM or cert-manager) ───────────────────────────────
# Fallback: sync a wildcard cert from Secrets Manager if not using cert-manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cerebro-hive-tls
  namespace: cerebro-hive
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: cerebro-hive-secrets-store
    kind: SecretStore
  target:
    name: cerebro-hive-tls
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: cerebro-hive/production/tls
        property: certificate
    - secretKey: tls.key
      remoteRef:
        key: cerebro-hive/production/tls
        property: private_key

---
# ─── Keycloak admin credentials ───────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-secrets
  namespace: cerebro-hive
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: cerebro-hive-secrets-store
    kind: SecretStore
  target:
    name: keycloak-admin-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: KEYCLOAK_ADMIN
      remoteRef:
        key: cerebro-hive/production/keycloak
        property: admin_username
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: cerebro-hive/production/keycloak
        property: admin_password

---
# ─── Observability secrets (Slack, PagerDuty) ─────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: cerebro-hive/production/observability
        property: SLACK_WEBHOOK_URL
    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: cerebro-hive/production/observability
        property: PAGERDUTY_ROUTING_KEY
