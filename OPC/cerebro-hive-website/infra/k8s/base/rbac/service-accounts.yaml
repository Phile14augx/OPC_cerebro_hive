---
# ──────────────────────────────────────────────────────────────────────────────
# Service Accounts — one per service for least-privilege IRSA (AWS) / Workload
# Identity (GCP / Azure). Each SA maps to an IAM role via annotation.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: studio
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/component: studio
  annotations:
    # AWS IRSA — override in environment overlay
    eks.amazonaws.com/role-arn: ""
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/component: forge
  annotations:
    eks.amazonaws.com/role-arn: ""
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/component: platform-api
  annotations:
    eks.amazonaws.com/role-arn: ""
    # This SA needs S3 access for document storage
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-api
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/component: forge-api
  annotations:
    eks.amazonaws.com/role-arn: ""
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-gateway
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/component: ai-gateway
  annotations:
    eks.amazonaws.com/role-arn: ""
    # Needs Secrets Manager access for LLM API keys
automountServiceAccountToken: false
