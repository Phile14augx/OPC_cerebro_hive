---
# ──────────────────────────────────────────────────────────────────────────────
# Argo Rollouts — AnalysisTemplate
# Used by canary rollouts to auto-promote or auto-rollback based on metrics.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: cerebro-hive-success-rate
  namespace: cerebro-hive
spec:
  args:
    - name: service-name
    - name: namespace
      value: cerebro-hive
  metrics:
    # ── HTTP Error Rate ──────────────────────────────────────
    - name: error-rate
      interval: 30s
      successCondition: result[0] < 0.05   # < 5% error rate
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.cerebro-hive-monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
              service="{{args.service-name}}",
              namespace="{{args.namespace}}",
              status=~"5.."
            }[5m])) /
            sum(rate(http_requests_total{
              service="{{args.service-name}}",
              namespace="{{args.namespace}}"
            }[5m]))

    # ── P99 Latency ──────────────────────────────────────────
    - name: p99-latency
      interval: 30s
      successCondition: result[0] < 2.0    # < 2s P99
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.cerebro-hive-monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{
                service="{{args.service-name}}",
                namespace="{{args.namespace}}"
              }[5m])) by (le)
            )

    # ── Pod Readiness ────────────────────────────────────────
    - name: pod-readiness
      interval: 30s
      successCondition: result[0] >= 1     # At least 1 pod ready
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.cerebro-hive-monitoring.svc.cluster.local:9090
          query: |
            kube_deployment_status_replicas_ready{
              deployment="{{args.service-name}}",
              namespace="{{args.namespace}}"
            }

---
# AnalysisTemplate for AI Gateway (includes LLM-specific metrics)
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ai-gateway-health
  namespace: cerebro-hive
spec:
  args:
    - name: namespace
      value: cerebro-hive
  metrics:
    - name: llm-error-rate
      interval: 30s
      successCondition: result[0] < 0.1   # < 10% LLM errors (providers can be flaky)
      failureLimit: 5
      provider:
        prometheus:
          address: http://prometheus.cerebro-hive-monitoring.svc.cluster.local:9090
          query: |
            sum(rate(ai_gateway_llm_errors_total{
              namespace="{{args.namespace}}"
            }[5m])) /
            sum(rate(ai_gateway_llm_requests_total{
              namespace="{{args.namespace}}"
            }[5m]))

    - name: token-throughput
      interval: 60s
      successCondition: result[0] > 0     # Gateway is actively processing requests
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.cerebro-hive-monitoring.svc.cluster.local:9090
          query: |
            sum(rate(ai_gateway_tokens_total{
              namespace="{{args.namespace}}"
            }[5m]))

---
# Rollout for studio with canary strategy
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: studio-rollout
  namespace: cerebro-hive
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: studio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: studio
        app.kubernetes.io/component: studio
    spec:
      serviceAccountName: studio
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: studio
      containers:
        - name: studio
          image: ghcr.io/cerebro-hive/cerebro-hive/studio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: cerebro-hive-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: cerebro-hive-secrets
                  key: NEXTAUTH_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/apps/studio/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
      imagePullSecrets:
        - name: ghcr-credentials

  strategy:
    canary:
      # Stable service routes all prod traffic; canary gets a slice
      stableService: studio
      canaryService: studio-canary
      trafficRouting:
        nginx:
          stableIngress: cerebro-hive-ingress
      steps:
        - setWeight: 5       # 5% of traffic to canary
        - pause: {duration: 2m}
        - analysis:
            templates:
              - templateName: cerebro-hive-success-rate
            args:
              - name: service-name
                value: studio
        - setWeight: 25
        - pause: {duration: 3m}
        - analysis:
            templates:
              - templateName: cerebro-hive-success-rate
            args:
              - name: service-name
                value: studio
        - setWeight: 50
        - pause: {duration: 5m}
        - setWeight: 100
      autoPromotionEnabled: false   # Manual promotion for production
      abortScaleDownDelaySeconds: 30
