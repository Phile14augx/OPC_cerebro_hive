apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: studio
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/name: studio
    app.kubernetes.io/component: studio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: studio
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # 5 min cooldown
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
