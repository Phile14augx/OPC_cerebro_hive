apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: ai-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: ai-gateway
  ports:
    - name: http
      port: 80
      targetPort: 4010
      protocol: TCP
