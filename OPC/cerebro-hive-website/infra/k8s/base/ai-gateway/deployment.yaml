apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: ai-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
      app.kubernetes.io/component: ai-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway
        app.kubernetes.io/component: ai-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4010"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ai-gateway
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120  # Long for in-flight LLM streaming

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-gateway

      containers:
        - name: ai-gateway
          image: ghcr.io/cerebro-hive/cerebro-hive/ai-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4010
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: [ALL]

          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4010"

            # LLM API Keys from Kubernetes Secret (sourced from AWS Secrets Manager)
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cerebro-hive-ai-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cerebro-hive-ai-secrets
                  key: OPENAI_API_KEY
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cerebro-hive-ai-secrets
                  key: GOOGLE_AI_API_KEY
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cerebro-hive-ai-secrets
                  key: AZURE_OPENAI_API_KEY
                  optional: true
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: cerebro-hive-config
                  key: AZURE_OPENAI_ENDPOINT
                  optional: true

            # Redis for response caching & rate limiting
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cerebro-hive-secrets
                  key: REDIS_URL

            # Observability
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: cerebro-hive-config
                  key: OTEL_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: ai-gateway

            # Gateway config
            - name: AI_GATEWAY_RATE_LIMIT_RPM
              valueFrom:
                configMapKeyRef:
                  name: cerebro-hive-config
                  key: AI_GATEWAY_RATE_LIMIT_RPM
                  optional: true
            - name: AI_GATEWAY_CACHE_TTL
              value: "300"
            - name: AI_GATEWAY_ENABLE_STREAMING
              value: "true"
            - name: AI_GATEWAY_ENABLE_COST_TRACKING
              value: "true"

            # Node.js tuning for high-concurrency streaming
            - name: UV_THREADPOOL_SIZE
              value: "16"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi

          readinessProbe:
            httpGet:
              path: /health
              port: 4010
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 4010
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          lifecycle:
            preStop:
              exec:
                # Allow in-flight LLM responses to complete
                command: ["/bin/sh", "-c", "sleep 30"]

      volumes:
        - name: tmp
          emptyDir: {}

      imagePullSecrets:
        - name: ghcr-credentials
