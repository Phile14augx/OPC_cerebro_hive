---
# ──────────────────────────────────────────────────────────────────────────────
# CerebroHive — NGINX Ingress
#
# Routing:
#   app.cerebrohive.com       → studio (Next.js)
#   forge.cerebrohive.com     → forge (Next.js workflow builder)
#   api.cerebrohive.com       → platform-api (REST API)
#   gateway.cerebrohive.com   → ai-gateway (internal — IP allowlisted)
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cerebro-hive-ingress
  namespace: cerebro-hive
  annotations:
    # NGINX controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

    # Rate limiting (per IP)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Body size limit
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # Streaming support for LLM responses
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

    # CORS for API
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.cerebrohive.com,https://forge.cerebrohive.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Workspace-ID"

    # cert-manager TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # WAF annotations (if using ModSecurity)
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"

spec:
  tls:
    - hosts:
        - app.cerebrohive.com
        - forge.cerebrohive.com
        - api.cerebrohive.com
      secretName: cerebro-hive-tls

  rules:
    # CerebroStudio — main product frontend
    - host: app.cerebrohive.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: studio
                port:
                  name: http

    # HiveForge — workflow builder
    - host: forge.cerebrohive.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forge
                port:
                  name: http

    # Platform API
    - host: api.cerebrohive.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-api
                port:
                  name: http
