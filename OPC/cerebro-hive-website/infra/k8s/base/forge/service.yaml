apiVersion: v1
kind: Service
metadata:
  name: forge
  namespace: cerebro-hive
  labels:
    app.kubernetes.io/name: forge
    app.kubernetes.io/component: forge
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forge
    app.kubernetes.io/component: forge
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
