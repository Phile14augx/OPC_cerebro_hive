{{/*
HorizontalPodAutoscaler for all enabled services with HPA configured.
*/}}

{{- $services := dict
  "studio"       .Values.studio
  "forge"        .Values.forge
  "platform-api" .Values.platform_api
  "forge-api"    .Values.forge_api
  "ai-gateway"   .Values.ai_gateway
-}}

{{- range $svcName, $cfg := $services }}
{{- if and $cfg $cfg.enabled $cfg.hpa $cfg.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svcName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cerebro-hive.serviceLabels" (dict "root" $ "svc" $svcName) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: {{ if $.Values.rollouts.enabled }}argoproj.io/v1alpha1{{ else }}apps/v1{{ end }}
    kind: {{ if $.Values.rollouts.enabled }}Rollout{{ else }}Deployment{{ end }}
    name: {{ $svcName }}
  minReplicas: {{ $cfg.hpa.minReplicas | default 2 }}
  maxReplicas: {{ $cfg.hpa.maxReplicas | default 10 }}
  metrics:
    {{- include "cerebro-hive.hpaMetrics" (dict "cfg" $cfg) | nindent 4 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
{{- end }}
{{- end }}
