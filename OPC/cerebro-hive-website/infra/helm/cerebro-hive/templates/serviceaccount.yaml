{{/*
ServiceAccounts for all enabled services.
*/}}

{{- $services := dict
  "studio"       .Values.studio
  "forge"        .Values.forge
  "platform-api" .Values.platform_api
  "forge-api"    .Values.forge_api
  "ai-gateway"   .Values.ai_gateway
-}}

{{- range $svcName, $cfg := $services }}
{{- if and $cfg $cfg.enabled }}
{{- if and $cfg.serviceAccount $cfg.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cerebro-hive.serviceAccountName" (dict "svc" $svcName "cfg" $cfg) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cerebro-hive.serviceLabels" (dict "root" $ "svc" $svcName) | nindent 4 }}
  {{- with $cfg.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- end }}
