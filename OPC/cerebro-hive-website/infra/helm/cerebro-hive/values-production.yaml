# ──────────────────────────────────────────────────────────────────────────────
# CerebroHive — Production Environment Overrides
# ──────────────────────────────────────────────────────────────────────────────

global:
  environment: production
  domain: cerebrohive.com
  appUrl: "https://app.cerebrohive.com"
  apiUrl: "https://api.cerebrohive.com"

studio:
  replicaCount: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  hpa:
    minReplicas: 3
    maxReplicas: 10
  pdb:
    minAvailable: 2
  ingress:
    host: app.cerebrohive.com

forge:
  replicaCount: 2
  hpa:
    minReplicas: 2
    maxReplicas: 8
  pdb:
    minAvailable: 2
  ingress:
    host: forge.cerebrohive.com

platform_api:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  hpa:
    minReplicas: 3
    maxReplicas: 12
  pdb:
    minAvailable: 2
  ingress:
    host: api.cerebrohive.com

forge_api:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 2Gi
  hpa:
    minReplicas: 2
    maxReplicas: 8
  pdb:
    minAvailable: 1

ai_gateway:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1.5Gi
  hpa:
    minReplicas: 3
    maxReplicas: 20
  pdb:
    minAvailable: 2
  config:
    rateLimitRPM: 1000
    enableCaching: true
    cacheTTL: 600

# Production uses managed cloud services — no in-cluster databases
postgresql:
  enabled: false

redis:
  enabled: false

nats:
  enabled: false

# Enable Argo Rollouts with canary strategy in production
rollouts:
  enabled: true
  canary:
    autoPromotionEnabled: false   # Require manual promotion
    analysis:
      enabled: true
