version: 2
updates:
  # Website (Next.js / npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "security"

  # AgentOS backend (FastAPI / pip)
  - package-ecosystem: "pip"
    directory: "/agentos"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions workflows themselves — supply-chain hygiene for CI (section
  # 24: pin/patch actions, don't run stale/vulnerable action versions).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "security"
