# ──────────────────────────────────────────────────────────────────────────────
# GitHub Labeler — auto-label PRs based on changed files
# ──────────────────────────────────────────────────────────────────────────────

"area: studio":
  - changed-files:
      - any-glob-to-any-file: ["apps/studio/**"]

"area: forge":
  - changed-files:
      - any-glob-to-any-file: ["apps/forge/**"]

"area: platform-api":
  - changed-files:
      - any-glob-to-any-file: ["apps/platform-api/**"]

"area: forge-api":
  - changed-files:
      - any-glob-to-any-file: ["services/forge-api/**"]

"area: ai-gateway":
  - changed-files:
      - any-glob-to-any-file: ["packages/ai-gateway/**", "packages/ai/**"]

"area: infra":
  - changed-files:
      - any-glob-to-any-file: ["infra/**", "docker-compose.yml"]

"area: kubernetes":
  - changed-files:
      - any-glob-to-any-file: ["infra/k8s/**", "infra/helm/**", "infra/argocd/**"]

"area: terraform":
  - changed-files:
      - any-glob-to-any-file: ["infra/terraform/**"]

"area: ci":
  - changed-files:
      - any-glob-to-any-file: [".github/**"]

"area: security":
  - changed-files:
      - any-glob-to-any-file: [".semgrep/**", ".gitleaks.toml", "infra/security/**"]

"area: docs":
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "**/*.md"]

"area: database":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/database/**"
          - "**/prisma/**"
          - "**/*.prisma"

"area: observability":
  - changed-files:
      - any-glob-to-any-file:
          - "infra/docker/otel/**"
          - "infra/docker/prometheus/**"
          - "infra/docker/grafana/**"
          - "infra/docker/loki/**"
          - "infra/docker/tempo/**"
          - "infra/docker/alertmanager/**"
          - "packages/telemetry/**"

"type: breaking-change":
  - head-branch: ["^breaking/.*"]

"type: feature":
  - head-branch: ["^feature/.*", "^feat/.*"]

"type: bugfix":
  - head-branch: ["^fix/.*", "^bugfix/.*", "^hotfix/.*"]

"type: refactor":
  - head-branch: ["^refactor/.*"]

"type: chore":
  - head-branch: ["^chore/.*", "^deps/.*"]
