name: Feature Request
description: Propose a new feature, component, or enhancement.
title: "[FEATURE]: "
labels: ["enhancement", "status: backlog"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide a clear description of the new feature and how it fits into the CerebroHive platform.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the feature and why do we need it?
      placeholder: "As a user, I want..."
    validations:
      required: true
  - type: input
    id: epic_link
    attributes:
      label: Parent Epic
      description: If this belongs to an Epic, please link the issue number here.
      placeholder: "#123"
  - type: textarea
    id: technical_design
    attributes:
      label: Proposed Implementation (Optional)
      description: Any thoughts on how this should be built? (Components, APIs, etc.)
