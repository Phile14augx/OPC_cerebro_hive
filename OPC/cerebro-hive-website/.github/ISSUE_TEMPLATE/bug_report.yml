name: Bug Report
description: Create a report to help us improve.
title: "[BUG]: "
labels: ["bug", "status: un-triaged"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide a clear and concise description of the bug.
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: How do we replicate this bug?
      value: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local / Development
        - Preview / Staging
        - Production
    validations:
      required: true
