name: Security scan

# Runs on every push/PR so a vulnerable dependency or a leaked secret is
# caught before merge, not discovered later. Complements Dependabot (which
# opens PRs on a schedule) with checks that run on every change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep even if nothing was pushed, since advisory databases update
    # independently of this repo's commit history.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (website)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # moderate+ fails the build; low-severity advisories are noise at this
      # scale and shouldn't block merges.
      - run: npm audit --audit-level=moderate

  pip-audit:
    name: pip-audit (agentos backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pip-audit
      # To accept a specific, triaged advisory rather than blocking the build,
      # add `--ignore-vuln <GHSA-id>` here with a comment explaining why.
      - run: pip-audit --strict

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
