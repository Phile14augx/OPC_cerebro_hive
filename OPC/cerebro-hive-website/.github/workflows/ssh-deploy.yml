name: Deploy to VPS via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './OPC/cerebro-hive-website/package-lock.json'

    - name: Install dependencies
      working-directory: ./OPC/cerebro-hive-website
      run: npm ci

    - name: Build (standalone)
      working-directory: ./OPC/cerebro-hive-website
      run: npm run build
      env:
        IS_FTP_DEPLOY: "true"

    - name: Prepare standalone bundle
      working-directory: ./OPC/cerebro-hive-website
      run: |
        cp -R public .next/standalone/
        cp -R .next/static .next/standalone/.next/
        cp -R scripts .next/standalone/
        cp -R nginx .next/standalone/

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Bootstrap VPS (first run)
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script_stop: false
        script: |
          mkdir -p /var/www/cerebro-hive
          command -v node &>/dev/null || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs)
          command -v pm2 &>/dev/null || (npm install -g pm2 && pm2 startup systemd -u root --hp /root | tail -1 | bash)
          command -v nginx &>/dev/null || (apt-get install -y nginx && systemctl enable nginx)
          command -v ufw &>/dev/null && (ufw allow 80/tcp || true) && (ufw allow 443/tcp || true) || true
          iptables -I INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || true
          iptables -I INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || true

    - name: Upload build to VPS
      run: |
        rsync -az --delete \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./OPC/cerebro-hive-website/.next/standalone/ \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/cerebro-hive/

    - name: Restart app with PM2
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: bash /var/www/cerebro-hive/scripts/vps-restart.sh

    - name: Configure Nginx and provision HTTPS
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: bash /var/www/cerebro-hive/scripts/vps-nginx.sh
