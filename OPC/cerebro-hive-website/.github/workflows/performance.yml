name: Performance

# ──────────────────────────────────────────────────────────────────────────────
# CerebroHive — Performance Testing Pipeline
#
# Runs:
#   1. Lighthouse CI   — Core Web Vitals, accessibility, best practices
#   2. Bundle analysis — Track JS bundle size regression
#   3. Load testing    — k6 smoke test against staging
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/studio/**"
      - "apps/forge/**"
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday baseline
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────
  # Lighthouse CI
  # ────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build studio
        run: pnpm --filter @cerebro/studio run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # Bundle size analysis
  # ────────────────────────────────────────────────────────────
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with bundle analysis
        run: pnpm --filter @cerebro/studio run build
        env:
          ANALYZE: "true"
          NEXT_TELEMETRY_DISABLED: "1"
        continue-on-error: true

      - name: Upload bundle analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-analysis
          path: apps/studio/.next/analyze/
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # k6 load test (staging only)
  # ────────────────────────────────────────────────────────────
  load-test:
    name: k6 Load Test (Staging)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: infra/k6/smoke-test.js
          flags: --out json=k6-results.json
        env:
          K6_BASE_URL: https://staging.cerebrohive.com
          K6_API_TOKEN: ${{ secrets.STAGING_API_TOKEN }}
        continue-on-error: true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-test-results
          path: k6-results.json
          retention-days: 30
