name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./OPC/cerebro-hive-website

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ./OPC/cerebro-hive-website/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @cerebro/database exec prisma generate

      - name: Type Check
        run: pnpm --filter @cerebro/studio exec tsc --noEmit

      - name: Lint
        run: pnpm run lint || true

      - name: Build
        run: pnpm run build
        env:
          IS_FTP_DEPLOY: "true"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./OPC/cerebro-hive-website/apps/studio/.next
          retention-days: 7
