version: '3.8'

# ============================================================
# CerebroHive Platform — Local Development Stack
# ============================================================
# Services:
#   Core:       PostgreSQL + pgvector, Redis
#   Events:     NATS JetStream
#   Search:     OpenSearch
#   Storage:    MinIO
#   Identity:   Keycloak
#   Tooling:    pgAdmin
#
# Usage:
#   docker compose up -d           # Start all
#   docker compose up -d db redis  # Start only core
# ============================================================

services:

  # ─── Core Storage ──────────────────────────────────────────

  db:
    image: pgvector/pgvector:pg16
    container_name: cerebrohive-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cerebrohive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-cerebrohive_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cerebrohive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cerebrohive-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Event Bus ─────────────────────────────────────────────

  nats:
    image: nats:2.10-alpine
    container_name: cerebrohive-nats
    restart: always
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--name=cerebrohive-node"
    ports:
      - "4222:4222"    # Client connections
      - "8222:8222"    # Monitoring HTTP
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Search ────────────────────────────────────────────────

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: cerebrohive-opensearch
    restart: always
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-Opensearch@123!}
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=false
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200/_cluster/health -u admin:${OPENSEARCH_PASSWORD:-Opensearch@123!} | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: cerebrohive-opensearch-dashboards
    restart: always
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-Opensearch@123!}
    depends_on:
      opensearch:
        condition: service_healthy

  # ─── Object Storage ────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: cerebrohive-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Identity & Auth ───────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cerebrohive-keycloak
    restart: always
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-cerebrohive_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-cerebrohive}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword123}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ─── CerebroForge™ API ────────────────────────────────────

  forge-api:
    build:
      context: .
      dockerfile: services/forge-api/Dockerfile
    container_name: cerebrohive-forge-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cerebrohive}:${POSTGRES_PASSWORD:-supersecretpassword123}@db:5432/${POSTGRES_DB:-cerebrohive_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword123}@redis:6379
      FORGE_API_PORT: 4005
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL_ID: ${AI_MODEL_ID:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4005:4005"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Tooling ───────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cerebrohive-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@cerebrohive.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

# ─── Volumes ───────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  nats_data:
  opensearch_data:
  minio_data:
  pgadmin_data:

# ─── Networks ──────────────────────────────────────────────

networks:
  default:
    name: cerebrohive-platform

  # --- Observability (Phase 5) -------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: cerebrohive-otel
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/docker/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics exporter

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: cerebrohive-prometheus
    restart: always
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: cerebrohive-jaeger
    restart: always
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4317"        # OTLP gRPC

  loki:
    image: grafana/loki:2.9.4
    container_name: cerebrohive-loki
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.3.3
    container_name: cerebrohive-grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
  prometheus_data:
  grafana_data:

  # --- Temporal (Phase 7) ------------------------------------

  temporal:
    container_name: cerebrohive-temporal
    image: temporalio/auto-setup:1.24.2
    restart: always
    ports:
      - "7233:7233"
    environment:
      - CASSANDRA_USER=temporal
      - CASSANDRA_PASSWORD=temporal
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_SEEDS=db
      - POSTGRES_USER=
      - POSTGRES_PWD=
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      db:
        condition: service_healthy

  temporal-ui:
    container_name: cerebrohive-temporal-ui
    image: temporalio/ui:2.27.1
    restart: always
    ports:
      - "8081:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
