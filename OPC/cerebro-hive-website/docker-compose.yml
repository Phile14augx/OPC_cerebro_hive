version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cerebrohive-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cerebrohive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-cerebrohive_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cerebrohive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (For visual management of the database)
  pgadmin:
    image: dpage/pgadmin4
    container_name: cerebrohive-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@cerebrohive.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Redis (For caching, rate limiting, and background queues)
  redis:
    image: redis:7-alpine
    container_name: cerebrohive-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
