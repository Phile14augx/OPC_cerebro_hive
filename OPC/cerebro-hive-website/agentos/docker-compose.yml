version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos
      POSTGRES_DB: agentos
    ports:
      - "5432:5432"
    volumes:
      - agentos_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  agentos:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg2://agentos:agentos@postgres:5432/agentos
      AGENTOS_ADMIN_SECRET: ${AGENTOS_ADMIN_SECRET:-}
      AGENTOS_ALLOWED_ORIGINS: ${AGENTOS_ALLOWED_ORIGINS:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8088:8088"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8088 --no-server-header

volumes:
  agentos_pg:
